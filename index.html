------------------------------------------------ */
function parsePlan(detail) {
  if (!detail) return null;
  const line = detail.split('\n')[0];
  const plan = {
    sets: null,
    reps: null,
    weight: null,
    tempo: null,
    ivn: null,
    perSet: null
  };
  const sr = line.match(/(\d+)\s*\*\s*([^,\n]+)/i);
  if (sr) {
    plan.sets = parseInt(sr[1]);
    plan.reps = sr[2].trim();
  }
  const w = line.match(/(\d+(?:[.,]\d+)?(?:\s*[-\/]\s*\d+(?:[.,]\d+)?)*)\s*кг/i);
  if (w) {
    plan.weight = w[1].replace(/\s/g, '') + 'кг';
    if (w[1].includes('/')) plan.perSet = w[1].split('/').map(s => s.trim());
  } else {
    const r = line.match(/((?:красн|син|зелен|желт|фиол|черн|оранж)\w*\.?\s*рез\w*)/i);
    if (r) plan.weight = r[1];
  }
  const t = line.match(/(?:^|,)\s*([0-9X]{4})\s*(?:,|$)/i);
  if (t) plan.tempo = t[1];
  const iv = line.match(/ИВН\s*([\d\-]+)/i);
  if (iv) plan.ivn = iv[1];
  if (!plan.sets && !plan.weight && !plan.tempo && !plan.ivn) return null;
  return plan;
}
